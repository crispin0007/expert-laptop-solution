services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-techyatra}
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    # Wait for Postgres to accept connections before Django starts.
    # Without this, `web` races against Postgres startup and spams connection errors.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-techyatra}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: ./backend
    # dev-entrypoint.sh runs `migrate --noinput` BEFORE starting gunicorn.
    # This prevents the recurring 401 on login that occurs when a new model
    # field is added but the migration isn't applied — the ORM includes the
    # new column in SQL queries, Postgres throws OperationalError, and the
    # tenant middleware silently fails to resolve the tenant.
    command: bash /usr/src/app/dev-entrypoint.sh
    volumes:
      - ./backend:/usr/src/app
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy   # wait for pg_isready before starting Django
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  celery:
    build: ./backend
    command: celery -A config worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/usr/src/app
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # Celery Beat — periodic task scheduler (SLA checks, token flush, etc.)
  # Runs alongside the worker; one instance is sufficient in dev.
  celery-beat:
    build: ./backend
    command: celery -A config beat --loglevel=info
    volumes:
      - ./backend:/usr/src/app
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      celery:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      # Inside Docker, the Django backend service is 'web', not 'localhost'.
      # Vite reads this in vite.config.ts (process.env) to configure the
      # dev-server proxy target. Never use localhost here — it refers to the
      # frontend container itself, not the Django container.
      - VITE_API_BASE=http://web:8000
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  node_modules:

