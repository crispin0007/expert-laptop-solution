# ─── Block direct IP access ──────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 444;  # Drop connection silently (no response at all)
}

# ─── Main domain + all subdomains ─────────────────────────────────────────────
server {
    listen 80;
    # Accept root admin domain + all tenant subdomains
    server_name bms.techyatra.com.np *.bms.techyatra.com.np;

    client_max_body_size 20M;

    # Django static files
    location /static/ {
        alias /usr/src/app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Django media files
    location /media/ {
        alias /usr/src/app/media/;
        expires 7d;
    }

    # Django API + admin
    location ~ ^/(api|admin|health)/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # React frontend (SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ─── Custom tenant domains (e.g. crm.els.com) ──────────────────────────────────
# Catches domains not matching *.bms.techyatra.com.np (i.e. custom tenant domains).
# Direct IP hits are blocked by the default_server block above.
server {
    listen 80;
    server_name ~^(?!\d+\.\d+\.\d+\.\d+$).+;  # any non-IP hostname

    client_max_body_size 20M;

    location /static/ {
        alias /usr/src/app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /usr/src/app/media/;
        expires 7d;
    }

    location ~ ^/(api|admin|health)/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
