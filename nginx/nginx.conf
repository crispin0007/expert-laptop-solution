# ─── Rate limiting zone (brute-force protection on auth endpoints) ────────────
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

# ─── Block direct IP access ──────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/bms.techyatra.com.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bms.techyatra.com.np/privkey.pem;
    return 444;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name bms.techyatra.com.np *.bms.techyatra.com.np;
    return 301 https://$host$request_uri;
}

# ─── Root domain only (super admin — /admin/ allowed) ────────────────────────
server {
    listen 443 ssl;
    server_name bms.techyatra.com.np;

    ssl_certificate /etc/letsencrypt/live/bms.techyatra.com.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bms.techyatra.com.np/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' wss:; frame-ancestors 'none'" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 20M;

    location /static/ {
        alias /usr/src/app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /usr/src/app/media/;
        expires 7d;
    }

    # Stricter rate limit on auth token endpoint
    location ~ ^/api/v1/accounts/token/ {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ~ ^/(api|health)/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-Slug "";  # strip — tenant resolved from Host in prod
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ─── Tenant subdomains (*.bms.techyatra.com.np — /admin/ blocked) ────────────
server {
    listen 443 ssl;
    server_name *.bms.techyatra.com.np;

    ssl_certificate /etc/letsencrypt/live/bms.techyatra.com.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bms.techyatra.com.np/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
